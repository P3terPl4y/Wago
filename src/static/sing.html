<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso · Wago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f6faf6 0%, #eaf5ea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            background: #fff;
            border-radius: 32px;
            padding: 40px 36px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(42, 122, 74, 0.06)
        }

        .login-wrapper .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px
        }

        .login-wrapper .brand img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            object-fit: cover
        }

        .login-wrapper .brand span {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e2b1e
        }

        .login-wrapper .brand span small {
            font-weight: 400;
            color: #4a5f4a;
            font-size: 0.9rem
        }

        .login-wrapper h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 20px 0 6px;
            color: #1e2b1e
        }

        .login-wrapper .sub {
            color: #4a5f4a;
            font-size: 0.95rem;
            margin-bottom: 24px
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2a5a3a;
            margin-bottom: 4px
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            border: 1.5px solid #e2ebe2;
            border-radius: 12px;
            background: #fafcfa;
            transition: border-color .25s
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a7a4a;
            box-shadow: 0 0 0 4px rgba(42, 122, 74, 0.08)
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #2a7a4a;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 16px rgba(42, 122, 74, 0.25)
        }

        .btn-login:hover {
            background: #1e5a38;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(42, 122, 74, 0.30)
        }

        .error-msg {
            background: #fee9e7;
            color: #b34034;
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 16px;
            display: none;
            font-size: 0.9rem
        }

        .error-msg.visible {
            display: block
        }

        .register-link {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            color: #4a5f4a
        }

        .register-link a {
            color: #2a7a4a;
            font-weight: 600;
            text-decoration: none
        }

        .register-link a:hover {
            text-decoration: underline
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4a5f4a;
            font-size: 0.9rem;
            margin-bottom: 16px;
            text-decoration: none
        }

        .back-home:hover {
            color: #2a7a4a
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Volver</a>
        <div class="brand">
            <img src="https://copilot.microsoft.com/shares/XsBodgkpbrmLF5JjNvXrA" alt="Wago" />
            <span>Wago <small>· acceso</small></span>
        </div>
        <h2>Inicia sesión</h2>
        <p class="sub">Accede a tu panel de control</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="model">Usuario o email</label>
                <input type="text" id="model" placeholder="Ej: admin o correo@ejemplo.com" required />
            </div>
            <div class="form-group">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>
                Entrar</button>
            <div id="errorMsg" class="error-msg">Credenciales incorrectas. Inténtalo de nuevo.</div>
        </form>
        <div class="register-link">
            ¿No tienes cuenta? <a href="/register">Regístrate</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const model = document.getElementById('model').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const errorEl = document.getElementById('errorMsg');
            if (!model || !pass) {
                errorEl.textContent = 'Todos los campos son obligatorios.';
                errorEl.classList.add('visible');
                return;
            }
            try {
                const r = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: model, email: model, password: pass })
                });
                const data = await r.json();
                if (r.ok) {
                    window.location.href = '/dashboard';
                } else if (r.status === 401) {
                    errorEl.textContent = 'Credenciales incorrectas.';
                    errorEl.classList.add('visible');
                } else {
                    errorEl.textContent = data.error || 'Error del servidor.';
                    errorEl.classList.add('visible');
                }
            } catch (e) {
                errorEl.textContent = 'Error de red.';
                errorEl.classList.add('visible');
            }
        });
        document.querySelectorAll('input').forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit')); }));
    </script>
</body>

</html>
